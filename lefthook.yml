# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  commands:
    hide:
      run: |
        task gs:hide
        git add '*.secret' .gitsecret/paths/mapping.cfg

    format:
      glob: "*.{js,ts,json,css,html}"
      run: task format
      stage_fixed: true

    lint-markdown:
      glob: "*.md"
      run: task lint-markdown
      stage_fixed: true

    test:
      run: task test

    # Sort Claude settings
    sort-settings:
      glob: ".claude/settings.local.json"
      run: |
        if [ -f .claude/settings.local.json ]; then
          jq --indent 2 '.permissions.allow |= sort' .claude/settings.local.json > .claude/.temp.$$.json && \
          mv .claude/.temp.$$.json .claude/settings.local.json
        fi
      stage_fixed: true

pre-push:
  commands:
    lighthouse:
      run: task lighthouse
