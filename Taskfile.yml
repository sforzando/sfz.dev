version: '3'

vars:
  TIMESTAMP:
    sh: date +%Y%m%d%H%M%S
  OS_NAME:
    sh: uname -s
  OPEN_TARGET: http://0.0.0.0:1313/

tasks:
  default:
    desc: 常用 - 開発サーバー起動
    cmds:
      - task: start

  setup:
    desc: 初回 - 初期セットアップ
    cmds:
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          brew install direnv
          brew install git-cliff
          brew install git-secret
          brew install hugo
          brew install netlify-cli
          brew install --cask ngrok
        fi
      - git submodule update --init --recursive
      - task: reveal
      - direnv allow
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "The setup process is complete."
        fi

  install:
    desc: 導入 - 依存パッケージをインストール
    cmds:
      - npm install
      - npm install --prefix themes/congo
      - npx playwright install --with-deps

  install-ci:
    desc: 導入 - CI環境用依存パッケージをインストール
    cmds:
      - npm ci
      - npm install --prefix themes/congo
      - npx playwright install --with-deps

  open:
    desc: 閲覧 - ブラウザで開く
    cmds:
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          open {{.OPEN_TARGET}}
        fi

  hide:
    desc: 秘匿 - git-secretで秘密情報を暗号化
    cmds:
      - git secret hide -vm

  reveal:
    desc: 暴露 - git-secretで秘密情報を復号化
    cmds:
      - git secret reveal -vf

  build-css:
    desc: 構築 - TailwindCSSをビルド
    cmds:
      - NODE_ENV=production ./themes/congo/node_modules/.bin/tailwindcss -c ./tailwind.config.js -i ./themes/congo/assets/css/main.css -o ./assets/css/compiled/main.css --jit

  build:
    desc: 構築 - 本番用静的サイトをビルド
    deps:
      - build-css
    cmds:
      - hugo --minify
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "The build process is complete."
        fi

  start:
    desc: 開始 - Hugo開発サーバー起動
    aliases:
      - dev
    deps:
      - build-css
    cmds:
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "Start the development server."
        fi
      - hugo server --buildDrafts --buildFuture

  stop:
    desc: 停止 - Hugo開発サーバーを全て停止
    cmds:
      - pkill -f "hugo server" || true
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "The development server has been stopped."
        fi

  generate-dummy:
    desc: 生成 - テスト用ダミーコンテンツを生成
    cmds:
      - |
        for i in $(seq -f "%04g" 0 23); do
          [ -f "content/works/dummy_${i}.en.md" ] || hugo new "works/dummy_${i}.en.md"
          [ -f "content/works/dummy_${i}.ja.md" ] || hugo new "works/dummy_${i}.ja.md"
        done
      - |
        for i in $(seq -f "%04g" 0 3); do
          [ -f "content/posts/dummy_${i}.en.md" ] || hugo new "posts/dummy_${i}.en.md"
          [ -f "content/posts/dummy_${i}.ja.md" ] || hugo new "posts/dummy_${i}.ja.md"
        done

  lint-markdown:
    desc: 検査 - Markdownlintでマークダウンを検査
    cmds:
      - npx markdownlint-cli2 --fix "**/*.md"

  format:
    desc: 整形 - コードフォーマット実行
    cmds:
      - npm run check:biome
      - npm run format:html

  test:
    desc: 試験 - ローカルサーバーでPlaywrightテスト実行
    cmds:
      - npx playwright test --update-snapshots --headed

  test-ci:
    desc: 試験 - CI環境でPlaywrightテスト実行
    cmds:
      - npx playwright test --ignore-snapshots

  test-prod:
    desc: 試験 - 本番サーバーでPlaywrightテスト実行
    cmds:
      - BASE_URL=https://sfz.dev npx playwright test --update-snapshots --headed

  lighthouse:
    desc: 試験 - Lighthouseパフォーマンス計測（本番ビルドで実行、スコアアサーション付き）
    vars:
      PORT:
        sh: node -e "const net=require('net');const s=net.createServer();s.listen(0,()=>{console.log(s.address().port);s.close()})"
    deps:
      - build
    cmds:
      - mkdir -p lighthouse-reports
      - defer: "lsof -ti:{{.PORT}} | xargs kill -9 || true"
      - npx serve public -l {{.PORT}} --no-clipboard &
      - sleep 2
      - npx lighthouse http://localhost:{{.PORT}}/ --config-path=./lighthouse.config.cjs --output=html,json --output-path=./lighthouse-reports/report --quiet --chrome-flags="--headless"
      - node scripts/lighthouse-assert.cjs

  ngrok:
    desc: 転送 - ngrokでローカルサーバーを公開
    cmds:
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "Start transfer using ngrok."
        fi
      - ngrok http 1313

  deploy:
    desc: 配備 - Netlifyへデプロイ
    cmds:
      - netlify init
      - netlify deploy {{.CLI_ARGS}}
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "The deployment process is complete."
        fi

  outdated:
    desc: 点検 - 依存パッケージの更新を確認
    cmds:
      - ncu --deep

  update-dependencies:
    desc: 追随 - 依存パッケージを更新
    cmds:
      - ncu --upgrade
      - rm -rfv node_modules
      - npm install
      - npx playwright install --with-deps

  update-theme:
    desc: 追随 - Congoテーマを更新
    cmds:
      - git submodule update --remote --merge themes/congo
      - npm install --prefix themes/congo

  update-changelog:
    desc: 記録 - CHANGELOGを更新
    cmds:
      - git cliff --bump --output CHANGELOG.md
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "The CHANGELOG has been updated."
        fi

  clean:
    desc: 掃除 - テスト結果を削除
    cmds:
      - rm -rf .playwright-mcp
      - rm -rf lighthouse-reports
      - rm -rf playwright-report
      - rm -rf test-results
      - rm -rf tests/snapshots
      - |
        if [ "{{.OS_NAME}}" = "Darwin" ]; then
          say "The cleanup process is complete."
        fi
